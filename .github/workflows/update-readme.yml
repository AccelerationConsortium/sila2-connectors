name: Update connector list

on:
  schedule:
    - cron: "0 6 * * *"  # daily at 6am UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate org-scoped token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AC_CONNECTORS_APP_ID }}
          private-key: ${{ secrets.AC_CONNECTORS_APP_KEY }}
          owner: AccelerationConsortium

      - name: Regenerate connector list
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python3 scripts/update_readme.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "chore: update connector list [skip ci]" && git push)
